<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Report · FTTH Wizard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pdf-report.css">
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-left">
    <div class="hamburger" onclick="toggleControls()" aria-label="Open controls">
      <i class="ti ti-menu-2" id="ctrl-hamburger-icon"></i>
    </div>
    <span class="topbar-title">Generate Report</span>
  </div>
  <div class="topbar-right">
    <div class="dropdown-wrap">
      <div class="dropdown-btn" onclick="toggleDropdown()" aria-label="More options">
        <i class="ti ti-dots-vertical"></i>
      </div>
      <div class="dropdown-menu" id="dropdown-menu">
        <div class="dropdown-item" onclick="window.location.href='index.html'"><i class="ti ti-arrow-left"></i> Wizard</div>
        <div class="dropdown-item" onclick="window.location.href='preview.html'"><i class="ti ti-eye"></i> Preview</div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item dropdown-item-tab active" data-type="full" onclick="switchType('full'); closeDropdown()">Full Report</div>
        <div class="dropdown-item dropdown-item-tab" data-type="handover" onclick="switchType('handover'); closeDropdown()">Handover Certificate</div>
        <div class="dropdown-item dropdown-item-tab" data-type="isp" onclick="switchType('isp'); closeDropdown()">ISP Record</div>
        <div class="dropdown-item dropdown-item-tab" data-type="maintenance" onclick="switchType('maintenance'); closeDropdown()">Maintenance Card</div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item" onclick="window.print()"><i class="ti ti-printer"></i> Print / Save PDF</div>
      </div>
    </div>
  </div>
</div>
</div>

<div class="controls-backdrop" id="controls-backdrop" onclick="closeControls()"></div>

<div class="shell">

  <!-- ── Controls panel ───────────────────────────────────── -->
  <div class="controls">
    <div>
      <div class="ctrl-section">Brand</div>
      <div class="ctrl-group">
        <div class="ctrl-row"><div><div class="ctrl-label">ISP / Company name</div></div></div>
        <input type="text" class="ctrl-input" id="isp-name" value="My ISP Ltd" oninput="rebuildReport()">
        <div class="ctrl-row"><div><div class="ctrl-label">Accent colour</div></div></div>
        <div class="color-row">
          <div class="color-swatch active" style="background:#1d9e75;" data-color="#1d9e75" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#185fa5;" data-color="#185fa5" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#7c3aed;" data-color="#7c3aed" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#b45309;" data-color="#b45309" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#be123c;" data-color="#be123c" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#0e7490;" data-color="#0e7490" onclick="setAccent(this)"></div>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="ctrl-section">Include sections</div>
      <div class="checklist" id="section-checks"></div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="ctrl-section">Completeness</div>
      <div class="completeness-block">
        <div class="pct" id="ctrl-pct">—%</div>
        <p>of required fields filled</p>
      </div>
      <div class="missing-list" id="ctrl-missing" style="display:none;"></div>
    </div>
    <div class="print-btn-wrap">
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="window.print()"><i class="ti ti-file-type-pdf"></i> Save as PDF</button>
      <p style="font-size:10px;color:var(--hint);margin-top:8px;text-align:center;">Use "Save as PDF" in the print dialog</p>
    </div>
  </div>

  <!-- ── Preview pane ──────────────────────────────────────── -->
  <div class="preview-pane" id="preview-pane">
    <div class="preview-label">PDF preview — use Print / Save PDF to export</div>
    <div id="report-output"></div>
  </div>

</div>

<script src="wizard-core.js"></script>
<script>
WizardState.load();

/* ── Config ──────────────────────────────────────────────── */
let accentColor = '#1d9e75';
let accentLight = '#e1f5ee';
let currentType = 'full';

const SECTION_TOGGLES = {
  full:        ['customer','service','odn','optical','ont','physical','testing','assets','acceptance'],
  handover:    ['customer','service','testing','acceptance'],
  isp:         ['customer','service','odn','optical','ont','physical','assets'],
  maintenance: ['customer','odn','optical','testing'],
};

let activeSections = [...SECTION_TOGGLES['full']];

const SECTION_LABELS = {
  customer:'Customer info', service:'Service info', odn:'ODN info',
  optical:'Optical readings', ont:'ONT / Router', physical:'Physical install',
  testing:'Testing & speeds', assets:'Asset tracking', acceptance:'Customer acceptance'
};

/* ── URL param ───────────────────────────────────────────── */
const urlType = new URLSearchParams(window.location.search).get('type');
if (urlType && SECTION_TOGGLES[urlType]) switchType(urlType, false);

/* ── Helpers ─────────────────────────────────────────────── */
function v(key) {
  const r = WizardState.get(key);
  return r && String(r).trim() ? String(r).trim() : '';
}
function dv(key) { return v(key) || '—'; }
function pf(label, key, mono) {
  const val = dv(key);
  return `<div class="pf"><div class="pl">${label}</div><div class="pv${val==='—'?' empty':''}${mono?' mono':''}">${val}</div></div>`;
}
function pfRaw(label, value, mono) {
  const empty = !value || value === '—';
  return `<div class="pf"><div class="pl">${label}</div><div class="pv${empty?' empty':''}${mono?' mono':''}">${empty?'—':value}</div></div>`;
}
function passTag(key) {
  const pv = v(key);
  if (!pv) return '<span style="color:#c0c8c4">—</span>';
  return pv === 'Fail'
    ? '<span class="fail">✗ FAIL</span>'
    : '<span class="pass">✓ PASS</span>';
}
function statusBadge(val) {
  if (!val) return '<span class="badge-warn">Unknown</span>';
  if (val.toLowerCase().includes('active')) return `<span class="badge-active">${val}</span>`;
  if (val.toLowerCase().includes('suspend')) return `<span class="badge-err">${val}</span>`;
  return `<span class="badge-warn">${val}</span>`;
}
function togBadge(key) {
  const on = v(key) === 'true' || v(key) === true;
  return `<span style="font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;background:${on?'#e1f5ee':'#f0f3f0'};color:${on?'#0f6e56':'#9eaaa4'};">${on?'✓ Yes':'✗ No'}</span>`;
}
function ispName() { return document.getElementById('isp-name')?.value || 'ISP Ltd'; }
function nowStr() { return new Date().toLocaleDateString('en-NG',{day:'2-digit',month:'short',year:'numeric'}); }
function css(extra='') {
  return `--accent:${accentColor};--accent-light:${accentLight};${extra}`;
}

/* ── Section builders ────────────────────────────────────── */
function buildCustomerSection() {
  return `
    <div class="pdf-section">
      <div class="pdf-section-title">Customer information</div>
      <div class="pdf-grid">
        ${pf('Full name','customer_name')}
        ${pf('Customer type','customer_type')}
        ${pf('Building type','building_type')}
        <div class="pf pdf-full"><div class="pl">Service address</div><div class="pv">${dv('address')}</div></div>
        ${pf('Nearest landmark','landmark')}
        ${pf('Phone','phone',true)}
        ${pf('Alternate contact','alt_phone',true)}
        ${pf('Ticket number','ticket_number',true)}
        ${pfRaw('Install date',v('install_date')?formatDate(v('install_date')):'')}
        ${pf('GPS coordinates','gps_coords',true)}
        ${pf('Technician','technician')}
      </div>
    </div>`;
}
function buildServiceSection() {
  const fee = v('monthly_fee') ? '₦' + Number(v('monthly_fee')).toLocaleString() : '—';
  return `
    <div class="pdf-section">
      <div class="pdf-section-title">Service information</div>
      <div class="pdf-grid-4">
        ${pfRaw('Status',statusBadge(v('service_status')))}
        ${pf('Plan / Package','service_plan')}
        ${pfRaw('CIR',v('cir')||'—')}
        ${pfRaw('Burst rate',v('burst_rate')||'—')}
        ${pf('VLAN ID','vlan_id',true)}
        ${pf('IP type','ip_type')}
        ${pf('IP address','ip_address',true)}
        ${pf('Subnet','subnet',true)}
        ${pfRaw('Contract',v('contract_duration')||'—')}
        ${pfRaw('Monthly fee',fee)}
        ${pf('BGP ASN','bgp_asn',true)}
        ${pf('VRF name','vrf_name',true)}
      </div>
    </div>`;
}
function buildODNSection() {
  return `
    <div class="pdf-section">
      <div class="pdf-section-title">ODN information</div>
      <div class="pdf-grid">
        ${pf('OLT name','olt_name',true)}
        ${pf('OLT IP','olt_ip',true)}
        ${pf('OLT port/card/slot','olt_port',true)}
        ${pf('PON technology','pon_tech')}
        ${pf('Splitter ratio','splitter_ratio')}
        ${pf('FAT / splitter label','splitter_location',true)}
        ${pf('FAT ID','fat_id',true)}
        ${pf('Fiber core #','fiber_core_num',true)}
        ${pf('Core status','fiber_core_status')}
        ${pf('Feeder cable','feeder_cable')}
        ${pf('Distribution cable','dist_cable')}
        ${pf('ONT serial','ont_serial_odn',true)}
      </div>
    </div>`;
}
function buildOpticalSection() {
  return `
    <div class="pdf-section">
      <div class="pdf-section-title">Optical measurements</div>
      <div class="pdf-grid-4" style="margin-bottom:10px;">
        ${pfRaw('OLT Tx power', v('olt_tx_power') ? v('olt_tx_power')+' dBm' : '',true)}
        ${pfRaw('OLT port (pre)', v('olt_pre_power') ? v('olt_pre_power')+' dBm' : '',true)}
        ${pfRaw('ONT Rx (pre)', v('ont_rx_pre') ? v('ont_rx_pre')+' dBm' : '',true)}
        ${pfRaw('OLT port (post)', v('olt_post_power') ? v('olt_post_power')+' dBm' : '',true)}
        ${pfRaw('ONT Rx (post)', v('ont_rx_post') ? v('ont_rx_post')+' dBm' : '',true)}
        ${pfRaw('Power margin', v('power_margin') ? v('power_margin')+' dB' : '',true)}
        ${pfRaw('Optical budget', v('optical_budget') ? v('optical_budget')+' dB' : '',true)}
        ${pf('OTDR available','otdr_available')}
      </div>
      <table class="pdf-table">
        <thead><tr><th>Segment</th><th>Loss (dB)</th><th>Result</th></tr></thead>
        <tbody>
          <tr><td>OLT → Feeder splitter</td><td>${v('loss_olt_splitter')||'—'}</td><td>${passTag('pass_olt_splitter')}</td></tr>
          <tr><td>Feeder splitter → FAT</td><td>${v('loss_splitter_fat')||'—'}</td><td>${passTag('pass_splitter_fat')}</td></tr>
          <tr><td>FAT → ONT</td><td>${v('loss_fat_ont')||'—'}</td><td>${passTag('pass_fat_ont')}</td></tr>
          <tr class="total-row"><td><strong>Total end-to-end</strong></td><td>${v('loss_total')||'—'}</td><td>—</td></tr>
        </tbody>
      </table>
    </div>`;
}
function buildONTSection() {
  return `
    <div class="pdf-section">
      <div class="pdf-section-title">ONT / Router information</div>
      <div class="pdf-grid">
        ${pf('ONT model','ont_model')}
        ${pf('ONT serial','ont_serial',true)}
        ${pf('ONT asset ID','ont_asset',true)}
        ${pf('Device ownership','device_ownership')}
        ${pf('Router model','router_model')}
        ${pf('Router asset ID','router_asset',true)}
        ${pf('WiFi band','wifi_band')}
        ${pf('WiFi SSID','wifi_ssid',true)}
        ${pf('LAN ports used','lan_ports_used',true)}
        ${pf('ONT firmware','ont_firmware',true)}
        ${pf('Management IP','mgmt_ip',true)}
        ${pf('TR-069 / CWMP','tr069')}
      </div>
    </div>`;
}
function buildPhysicalSection() {
  return `
    <div class="pdf-section">
      <div class="pdf-section-title">Physical installation</div>
      <div class="pdf-grid">
        ${pf('Pole ID','pole_id',true)}
        ${pf('Pole GPS','pole_gps',true)}
        ${pf('Pole condition','pole_condition')}
        ${pf('Drop cable type','drop_cable_type')}
        ${pfRaw('Drop cable length', v('drop_cable_length') ? v('drop_cable_length')+' m' : '',true)}
        ${pf('Fiber protection','fiber_protection')}
        ${pf('Earthing status','earthing_status')}
        <div class="pf pdf-full"><div class="pl">Drop cable route</div><div class="pv">${dv('drop_cable_route')}</div></div>
      </div>
      <div style="display:flex;gap:16px;margin-top:10px;">
        <div class="pf"><div class="pl">UPS installed</div>${togBadge('ups_installed')}</div>
        <div class="pf"><div class="pl">Surge protector</div>${togBadge('surge_installed')}</div>
        <div class="pf"><div class="pl">Outdoor enclosure</div>${togBadge('enclosure_installed')}</div>
      </div>
    </div>`;
}
function buildTestingSection() {
  const dl = v('download_speed'), ul = v('upload_speed'), ping = v('ping_ms'), jit = v('jitter_ms');
  return `
    <div class="pdf-section">
      <div class="pdf-section-title">Testing & verification</div>
      <div class="kpi-row">
        <div class="kpi"><div class="kv">${dl||'—'}</div><div class="ku">Mbps</div><div class="kl">Download</div></div>
        <div class="kpi"><div class="kv">${ul||'—'}</div><div class="ku">Mbps</div><div class="kl">Upload</div></div>
        <div class="kpi"><div class="kv">${ping||'—'}</div><div class="ku">ms</div><div class="kl">Latency</div></div>
        <div class="kpi"><div class="kv">${jit||'—'}</div><div class="ku">ms</div><div class="kl">Jitter</div></div>
      </div>
      <div class="pdf-grid-4">
        ${pf('Speed test server','speed_server')}
        ${pfRaw('Test timestamp',v('test_timestamp')?formatDateTime(v('test_timestamp')):'')}
        ${pfRaw('Packet loss', v('packet_loss') ? v('packet_loss')+'%' : '',true)}
        ${pfRaw('MOS score', v('mos_score') ? v('mos_score')+' / 5' : '',true)}
        ${pf('Nearest FAT','nearest_fat',true)}
        ${pf('Nearest handhole','nearest_handhole',true)}
        ${pf('Alt fiber core','alt_core')}
        ${pf('Escalation engineer','escalation_engineer')}
      </div>
      ${v('test_notes')?`<div class="pf" style="margin-top:8px;"><div class="pl">Test notes</div><div class="pv">${v('test_notes')}</div></div>`:''}
    </div>`;
}
function buildAssetsSection() {
  const MATERIALS = [
    {key:'drop_cable',label:'Drop cable',unit:'m'},
    {key:'patch_cord',label:'Patch cord',unit:'pcs'},
    {key:'fast_conn',label:'Fast connector (SC/APC)',unit:'pcs'},
    {key:'splitter',label:'Splitter',unit:'pcs'},
    {key:'cable_ties',label:'Cable ties',unit:'pcs'},
    {key:'clamps',label:'Cable clamps',unit:'pcs'},
    {key:'conduit',label:'Conduit',unit:'m'},
    {key:'rawbolt',label:'Wall plug / rawbolt',unit:'pcs'},
  ].filter(m => v('qty_'+m.key) && v('qty_'+m.key) !== '0');
  const rows = MATERIALS.length ? MATERIALS.map(m =>
    `<tr><td>${m.label}</td><td>${v('qty_'+m.key)}</td><td>${m.unit}</td><td style="font-family:monospace;font-size:9px;">${v('inv_'+m.key)||'—'}</td></tr>`
  ).join('') : `<tr><td colspan="4" style="color:#9eaaa4;text-align:center;font-style:italic;">No materials recorded</td></tr>`;
  return `
    <div class="pdf-section">
      <div class="pdf-section-title">Asset tracking</div>
      <table class="asset-tbl">
        <thead><tr><th>Material</th><th>Qty</th><th>Unit</th><th>Inventory ID</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="pdf-grid" style="margin-top:10px;">
        ${pfRaw('ONT asset ID', v('ont_asset_track')||v('ont_asset'), true)}
        ${pfRaw('Router asset ID', v('router_asset_track')||v('router_asset'), true)}
        ${pfRaw('UPS asset ID', v('ups_asset_track')||v('ups_asset'), true)}
      </div>
    </div>`;
}
function buildAcceptanceSection() {
  const custSig = v('sig_cust');
  const engSig  = v('sig_eng');
  return `
    <div class="pdf-section">
      <div class="pdf-section-title">Customer acceptance</div>
      <div class="pdf-grid" style="margin-bottom:12px;">
        ${pf('Customer name','accept_customer_name')}
        ${pf('Designation','accept_designation')}
        ${pfRaw('Acceptance date', v('accept_datetime')?formatDateTime(v('accept_datetime')):'')}
        <div class="pf pdf-full"><div class="pl">Handover notes</div><div class="pv">${dv('handover_notes')}</div></div>
        ${v('customer_comments')?`<div class="pf pdf-full"><div class="pl">Customer comments</div><div class="pv">${v('customer_comments')}</div></div>`:''}
      </div>
      <div class="sig-block">
        <div class="sig-box-pdf">
          <div class="sig-label">Customer signature</div>
          ${custSig?`<img src="${custSig}" alt="Customer signature">`:`<div class="sig-empty">Not yet signed</div>`}
          <div class="sig-name">${dv('accept_customer_name')} &nbsp;·&nbsp; ${dv('accept_designation')}</div>
        </div>
        <div class="sig-box-pdf">
          <div class="sig-label">Engineer certification</div>
          ${engSig?`<img src="${engSig}" alt="Engineer signature">`:`<div class="sig-empty">Not yet signed</div>`}
          <div class="sig-name">${dv('engineer_name')} &nbsp;·&nbsp; ${dv('engineer_id')}</div>
        </div>
      </div>
    </div>`;
}

/* ── Full Report ──────────────────────────────────────────── */
function buildFullReport() {
  const sections = [];
  if (activeSections.includes('customer'))   sections.push(buildCustomerSection());
  if (activeSections.includes('service'))    sections.push(buildServiceSection());
  if (activeSections.includes('odn'))        sections.push(buildODNSection());
  if (activeSections.includes('optical'))    sections.push(buildOpticalSection());
  if (activeSections.includes('ont'))        sections.push(buildONTSection());
  if (activeSections.includes('physical'))   sections.push(buildPhysicalSection());
  if (activeSections.includes('testing'))    sections.push(buildTestingSection());
  if (activeSections.includes('assets'))     sections.push(buildAssetsSection());
  if (activeSections.includes('acceptance')) sections.push(buildAcceptanceSection());

  return `
    <div class="pdf-page" style="${css()}">
      <div class="pdf-header">
        <div class="pdf-header-left">
          <div class="isp-name">${ispName()}</div>
          <div class="doc-type">FTTH / FTTB Installation Report</div>
        </div>
        <div class="pdf-header-right">
          <div class="ticket">${dv('ticket_number')}</div>
          <div class="date">${dv('install_date') !== '—' ? formatDate(v('install_date')) : nowStr()}</div>
          <div class="qr-placeholder">QR<br>Code</div>
        </div>
      </div>
      <div class="customer-strip" style="background:${accentLight};">
        <div class="cstrip-field"><div class="cl">Customer</div><div class="cv">${dv('customer_name')}</div></div>
        <div class="cstrip-field"><div class="cl">Plan / CIR</div><div class="cv">${dv('service_plan')} · ${dv('cir')}</div></div>
        <div class="cstrip-field"><div class="cl">ONT Serial</div><div class="cv" style="font-family:monospace;font-size:10px;">${dv('ont_serial')}</div></div>
        <div class="cstrip-field"><div class="cl">Technician</div><div class="cv">${dv('technician')}</div></div>
      </div>
      <div class="pdf-body">${sections.join('')}</div>
      <div class="pdf-footer">
        <span class="footer-accent">${ispName()}</span>
        <span>FTTH Installation Record · Ticket ${dv('ticket_number')}</span>
        <span>${nowStr()} · Nigerian ISP Standard</span>
      </div>
    </div>`;
}

/* ── Handover Certificate ─────────────────────────────────── */
function buildHandoverCert() {
  const custSig = v('sig_cust'), engSig = v('sig_eng');
  return `
    <div class="cert-page" style="${css()}">
      <div class="cert-border"></div>
      <div class="cert-inner">
        <div class="cert-logo-row">
          <div>
            <div style="font-size:16px;font-weight:700;color:${accentColor};">${ispName()}</div>
            <div style="font-size:10px;color:#6b7a73;">Fibre Installation Division</div>
          </div>
          <div class="cert-badge"><span class="cert-badge-icon">🏆</span></div>
        </div>
        <div class="cert-title">
          <h2>Customer Handover Certificate</h2>
          <p>This certifies that FTTH/FTTB fibre services have been successfully installed and commissioned</p>
        </div>
        <div class="cert-body">
          <div class="cert-grid">
            <div class="cert-field"><div class="cl">Customer name</div><div class="cv">${dv('customer_name')}</div></div>
            <div class="cert-field"><div class="cl">Ticket number</div><div class="cv" style="font-family:monospace;">${dv('ticket_number')}</div></div>
            <div class="cert-field"><div class="cl">Installation date</div><div class="cv">${v('install_date')?formatDate(v('install_date')):nowStr()}</div></div>
            <div class="cert-field" style="grid-column:1/-1"><div class="cl">Service address</div><div class="cv">${dv('address')}</div></div>
            <div class="cert-field"><div class="cl">Service plan</div><div class="cv">${dv('service_plan')}</div></div>
            <div class="cert-field"><div class="cl">Bandwidth (CIR)</div><div class="cv">${dv('cir')}</div></div>
            <div class="cert-field"><div class="cl">ONT serial</div><div class="cv" style="font-family:monospace;font-size:10px;">${dv('ont_serial')}</div></div>
            <div class="cert-field"><div class="cl">Download / Upload</div><div class="cv" style="font-family:monospace;">${dv('download_speed')} / ${dv('upload_speed')} Mbps</div></div>
            <div class="cert-field"><div class="cl">Signal level</div><div class="cv" style="font-family:monospace;">${v('ont_rx_post')?v('ont_rx_post')+' dBm':'—'}</div></div>
            <div class="cert-field"><div class="cl">Commissioned by</div><div class="cv">${dv('technician')}</div></div>
          </div>
        </div>
        <div class="cert-declaration">
          The above-named customer confirms that the fibre broadband installation has been completed to their satisfaction. 
          All equipment has been tested, and the service is operational as documented above.
        </div>
        <div class="cert-sigs">
          <div class="cert-sig-box">
            ${custSig?`<img src="${custSig}" alt="Customer signature" style="height:50px;width:100%;object-fit:contain;border:1px solid #dce8e0;border-radius:6px;background:#f8fbf9;padding:4px;">`:`<div style="height:50px;background:#f8fbf9;border:1px solid #dce8e0;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#c0c8c4;">Awaiting signature</div>`}
            <div class="cert-sig-label">Customer signature</div>
            <div class="cert-sig-name">${dv('accept_customer_name')}</div>
          </div>
          <div class="cert-sig-box">
            ${engSig?`<img src="${engSig}" alt="Engineer signature" style="height:50px;width:100%;object-fit:contain;border:1px solid #dce8e0;border-radius:6px;background:#f8fbf9;padding:4px;">`:`<div style="height:50px;background:#f8fbf9;border:1px solid #dce8e0;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#c0c8c4;">Awaiting signature</div>`}

            <div class="cert-sig-name">${dv('engineer_name')} · ${dv('engineer_id')}</div>
          </div>
        </div>
      </div>
    </div>`;
}

/* ── Orchestrate ──────────────────────────────────────────── */
function buildReport() {
  switch (currentType) {
    case 'full':        return buildFullReport();
    case 'handover':    return buildHandoverCert();
    case 'isp':         return buildISPRecord();
    case 'maintenance': return buildMaintenanceCard();
    default:            return buildFullReport();
  }
}

function rebuildReport() {
  document.getElementById('report-output').innerHTML = buildReport();
  updateCompleteness();
}

function switchType(type, rebuild=true) {
  currentType = type;
  document.querySelectorAll('.dropdown-item-tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
  activeSections = [...SECTION_TOGGLES[type]];
  buildSectionChecks();
  if (rebuild) rebuildReport();
}

function setAccent(el) {
  accentColor = el.dataset.color;
  // Derive light version
  const lightMap = {
    '#1d9e75':'#e1f5ee','#185fa5':'#e1eaf7','#7c3aed':'#ede9ff',
    '#b45309':'#faeeda','#be123c':'#fde8ef','#0e7490':'#e0f4f8'
  };
  accentLight = lightMap[accentColor] || '#f0f0f0';
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('active', s.dataset.color === accentColor));
  rebuildReport();
}

function buildSectionChecks() {
  const container = document.getElementById('section-checks');
  container.innerHTML = Object.entries(SECTION_LABELS).map(([key, label]) => {
    const checked = activeSections.includes(key);
    return `<label class="check-item">
      <input type="checkbox" ${checked?'checked':''} data-sec="${key}" onchange="toggleSection('${key}',this.checked)">
      ${label}
    </label>`;
  }).join('');
}

function toggleSection(key, on) {
  if (on) { if (!activeSections.includes(key)) activeSections.push(key); }
  else { activeSections = activeSections.filter(s => s !== key); }
  rebuildReport();
}

function updateCompleteness() {
  const pct = WizardState.getOverallCompletion();
  document.getElementById('ctrl-pct').textContent = pct + '%';
  const missing = [];
  for (let i = 0; i < 10; i++) {
    const m = WizardState.getMissingFields(i);
    if (m.length) missing.push(...m.slice(0, 2));
  }
  const block = document.getElementById('ctrl-missing');
  if (missing.length > 0) {
    block.style.display = 'block';
    block.innerHTML = `<strong>Missing required fields:</strong><ul>${missing.slice(0,6).map(f=>`<li>${f}</li>`).join('')}${missing.length>6?`<li>…and ${missing.length-6} more</li>`:''}</ul>`;
  } else {
    block.style.display = 'none';
  }
}

/* ── Mobile controls drawer ──────────────────────────────── */
function toggleControls() {
  const isOpen = document.body.classList.toggle('controls-open');
  document.getElementById('ctrl-hamburger-icon').className = isOpen ? 'ti ti-x' : 'ti ti-menu-2';
}

function closeControls() {
  document.body.classList.remove('controls-open');
  document.getElementById('ctrl-hamburger-icon').className = 'ti ti-menu-2';
}

/* ── Dropdown menu ───────────────────────────────────────── */
function toggleDropdown() {
  document.getElementById('dropdown-menu').classList.toggle('open');
}

function closeDropdown() {
  document.getElementById('dropdown-menu').classList.remove('open');
}

document.addEventListener('click', function(e) {
  const wrap = document.querySelector('.dropdown-wrap');
  if (wrap && !wrap.contains(e.target)) {
    closeDropdown();
  }
});

/* ── Init ────────────────────────────────────────────────── */
buildSectionChecks();
rebuildReport();
if (urlType) switchType(urlType);
</script>
