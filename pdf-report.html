<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Report · FTTH Wizard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── UI Shell ────────────────────────────────────────────── */
:root {
  --green:#1d9e75;--green-dark:#0f6e56;--green-light:#e1f5ee;--green-mid:#5dcaa5;
  --red:#e24b4a;--amber:#ba7517;
  --bg:#f0f4f2;--surface:#fff;--border:#dce8e0;--border-soft:#edf4f0;
  --text:#1a1e1b;--muted:#6b7a73;--hint:#9eaaa4;
  --radius:10px;--radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);transition:all .12s;}
.back-btn:hover{background:var(--green-light);color:var(--green-dark);}
.topbar-title{font-size:15px;font-weight:600;}
.type-tabs{display:flex;gap:6px;}
.tab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .12s;}
.tab.active{background:var(--green);color:white;border-color:var(--green);}
.tab:hover:not(.active){background:var(--green-light);color:var(--green-dark);}
.topbar-right{display:flex;gap:8px;}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s;font-family:'Inter',sans-serif;}
.btn:hover{background:#f0f4f2;}
.btn-primary{background:var(--green);color:white;border-color:var(--green);}
.btn-primary:hover{background:var(--green-dark);}

.shell{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 53px);}
.controls{background:var(--surface);border-right:1px solid var(--border);padding:20px 18px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;}
.ctrl-section{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.ctrl-group{display:flex;flex-direction:column;gap:8px;}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.ctrl-label{font-size:12px;color:var(--text);font-weight:500;}
.ctrl-sub{font-size:10px;color:var(--hint);margin-top:1px;}
.tog{width:38px;height:20px;background:var(--border);border-radius:10px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.tog.on{background:var(--green);}
.tog::after{content:'';width:15px;height:15px;background:white;border-radius:50%;position:absolute;top:2.5px;left:2.5px;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.18);}
.tog.on::after{left:20.5px;}
.color-row{display:flex;gap:6px;margin-top:2px;}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s;}
.color-swatch.active{border-color:var(--text);}
.ctrl-input{font-family:'Inter',sans-serif;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:7px;width:100%;color:var(--text);background:var(--surface);}
.ctrl-input:focus{outline:none;border-color:var(--green-mid);}
.checklist{display:flex;flex-direction:column;gap:6px;}
.check-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text);cursor:pointer;}
.check-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--green);}
.divider{height:1px;background:var(--border-soft);}
.print-btn-wrap{margin-top:auto;padding-top:14px;border-top:1px solid var(--border-soft);}
.completeness-block{background:var(--green-light);border-radius:8px;padding:10px 12px;}
.completeness-block .pct{font-size:20px;font-weight:700;color:var(--green-dark);}
.completeness-block p{font-size:11px;color:var(--muted);margin-top:2px;}
.missing-list{font-size:11px;color:#7a4e00;background:#fff8ee;border:1px solid #f0c060;border-radius:7px;padding:8px 10px;margin-top:8px;}
.missing-list ul{padding-left:14px;margin-top:4px;}
.missing-list li{margin-bottom:2px;}

/* ── Preview pane ─────────────────────────────────────────── */
.preview-pane{background:#d8ddd9;display:flex;flex-direction:column;align-items:center;padding:28px 20px 40px;overflow-y:auto;}
.preview-label{font-size:11px;color:#6b7a73;margin-bottom:14px;text-align:center;}

/* ── PDF Page (A4 proportions, rendered in browser) ───────── */
.pdf-page{
  width:794px;min-height:1123px;background:white;
  box-shadow:0 4px 32px rgba(0,0,0,.18);
  font-family:'Inter',system-ui,sans-serif;
  font-size:10px;color:#1a1e1b;
  position:relative;overflow:hidden;
  margin-bottom:16px;
}
/* Header band */
.pdf-header{padding:24px 32px 18px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:3px solid var(--accent,#1d9e75);}
.pdf-header-left .isp-name{font-size:18px;font-weight:700;color:var(--accent,#1d9e75);letter-spacing:-.3px;}
.pdf-header-left .doc-type{font-size:11px;color:#6b7a73;margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.pdf-header-right{text-align:right;}
.pdf-header-right .ticket{font-size:13px;font-weight:700;color:#1a1e1b;font-family:'JetBrains Mono',monospace;}
.pdf-header-right .date{font-size:10px;color:#6b7a73;margin-top:3px;}
.pdf-header-right .qr-placeholder{width:60px;height:60px;border:1.5px solid #dce8e0;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-left:auto;margin-top:6px;background:#f8fbf9;font-size:8px;color:#9eaaa4;text-align:center;line-height:1.3;}

/* Customer summary strip */
.customer-strip{background:var(--accent-light,#e1f5ee);padding:12px 32px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;border-bottom:1px solid #dce8e0;}
.cstrip-field .cl{font-size:8px;font-weight:700;color:#6b7a73;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.cstrip-field .cv{font-size:11px;font-weight:600;color:#1a1e1b;}

/* Body */
.pdf-body{padding:18px 32px 24px;}
.pdf-section{margin-bottom:16px;}
.pdf-section-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent,#1d9e75);border-bottom:1px solid #dce8e0;padding-bottom:4px;margin-bottom:10px;}
.pdf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 14px;}
.pdf-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 14px;}
.pdf-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px 14px;}
.pdf-full{grid-column:1/-1;}
.pf .pl{font-size:8px;font-weight:600;color:#9eaaa4;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.pf .pv{font-size:10px;color:#1a1e1b;font-weight:500;line-height:1.4;}
.pf .pv.mono{font-family:'JetBrains Mono',monospace;font-size:9.5px;}
.pf .pv.empty{color:#c0c8c4;font-style:italic;}

/* Optical table */
.pdf-table{width:100%;border-collapse:collapse;font-size:9px;}
.pdf-table th{background:#f8fbf9;padding:5px 8px;text-align:left;font-weight:700;color:#6b7a73;border:1px solid #dce8e0;font-size:8px;text-transform:uppercase;letter-spacing:.04em;}
.pdf-table td{padding:5px 8px;border:1px solid #dce8e0;font-family:'JetBrains Mono',monospace;}
.pdf-table .total-row td{background:#f0f9f5;font-weight:700;color:#0f6e56;}
.pdf-table .pass{color:#0f6e56;font-weight:700;}
.pdf-table .fail{color:#e24b4a;font-weight:700;}

/* Asset table */
.asset-tbl{width:100%;border-collapse:collapse;font-size:9px;}
.asset-tbl th{background:#f8fbf9;padding:5px 8px;text-align:left;font-weight:700;color:#6b7a73;border:1px solid #dce8e0;}
.asset-tbl td{padding:5px 8px;border:1px solid #dce8e0;}
.asset-tbl td:nth-child(2){font-family:'JetBrains Mono',monospace;text-align:center;font-weight:700;}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#dce8e0;border:1px solid #dce8e0;border-radius:8px;overflow:hidden;margin-bottom:14px;}
.kpi{background:white;padding:10px 12px;text-align:center;}
.kpi .kv{font-size:18px;font-weight:700;color:var(--accent,#1d9e75);font-family:'JetBrains Mono',monospace;line-height:1;}
.kpi .ku{font-size:7px;color:#9eaaa4;margin-top:1px;}
.kpi .kl{font-size:8px;font-weight:600;color:#6b7a73;text-transform:uppercase;letter-spacing:.04em;margin-top:4px;}

/* Signature block */
.sig-block{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px;}
.sig-box-pdf{border:1px solid #dce8e0;border-radius:6px;padding:10px;min-height:70px;background:#f8fbf9;}
.sig-box-pdf .sig-label{font-size:8px;font-weight:700;color:#6b7a73;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.sig-box-pdf img{max-height:55px;width:100%;object-fit:contain;}
.sig-box-pdf .sig-name{font-size:9px;font-weight:600;color:#1a1e1b;border-top:1px solid #dce8e0;padding-top:5px;margin-top:5px;}
.sig-box-pdf .sig-empty{font-size:9px;color:#c0c8c4;font-style:italic;text-align:center;padding-top:14px;}

/* Status badges */
.badge-active{display:inline-block;font-size:8px;padding:2px 8px;border-radius:20px;background:#e1f5ee;color:#0f6e56;font-weight:700;}
.badge-warn{display:inline-block;font-size:8px;padding:2px 8px;border-radius:20px;background:#faeeda;color:#7a4e00;font-weight:700;}
.badge-err{display:inline-block;font-size:8px;padding:2px 8px;border-radius:20px;background:#fcebeb;color:#7a1f1f;font-weight:700;}

/* Footer */
.pdf-footer{position:absolute;bottom:0;left:0;right:0;padding:10px 32px;background:#f8fbf9;border-top:1px solid #dce8e0;display:flex;justify-content:space-between;align-items:center;font-size:8px;color:#9eaaa4;}
.pdf-footer .footer-accent{color:var(--accent,#1d9e75);font-weight:600;}

/* Page break marker */
.page-break{width:794px;height:2px;background:#d0d8d4;margin:0 0 16px;display:flex;align-items:center;justify-content:center;}
.page-break span{background:#d0d8d4;padding:0 10px;font-size:10px;color:#9eaaa4;}

/* ── Handover Certificate style ─────────────────────────── */
.cert-page{width:794px;min-height:560px;background:white;box-shadow:0 4px 32px rgba(0,0,0,.18);font-family:'Inter',system-ui,sans-serif;color:#1a1e1b;position:relative;margin-bottom:16px;overflow:hidden;}
.cert-border{position:absolute;inset:12px;border:2px solid var(--accent,#1d9e75);border-radius:10px;pointer-events:none;}
.cert-inner{padding:32px 44px;}
.cert-logo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.cert-badge{width:56px;height:56px;background:var(--accent-light,#e1f5ee);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.cert-badge-icon{font-size:28px;color:var(--accent,#1d9e75);}
.cert-title{text-align:center;margin-bottom:20px;}
.cert-title h2{font-size:22px;font-weight:700;color:var(--accent,#1d9e75);letter-spacing:-.3px;}
.cert-title p{font-size:11px;color:#6b7a73;margin-top:4px;}
.cert-body{background:#f8fbf9;border:1px solid #dce8e0;border-radius:8px;padding:18px 22px;margin-bottom:18px;}
.cert-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.cert-field .cl{font-size:8px;font-weight:700;color:#9eaaa4;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.cert-field .cv{font-size:11px;font-weight:600;color:#1a1e1b;}
.cert-declaration{font-size:10px;color:#374151;line-height:1.6;margin-bottom:18px;text-align:center;padding:12px;background:#f0f9f5;border-radius:7px;border-left:3px solid var(--accent,#1d9e75);}
.cert-sigs{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.cert-sig-box{border-top:1.5px solid #dce8e0;padding-top:8px;}
.cert-sig-box img{height:50px;width:100%;object-fit:contain;margin-bottom:4px;border:1px solid #dce8e0;border-radius:6px;background:#f8fbf9;padding:4px;}
.cert-sig-label{font-size:9px;font-weight:700;color:#6b7a73;text-transform:uppercase;letter-spacing:.05em;}
.cert-sig-name{font-size:10px;font-weight:600;color:#1a1e1b;margin-top:2px;}

/* ── Print styles ─────────────────────────────────────────── */
@media print {
  body{background:white;}
  .topbar,.controls,.preview-label,.page-break,.print-btn-wrap{display:none!important;}
  .shell{display:block;}
  .preview-pane{background:white;padding:0;display:block;}
  .pdf-page,.cert-page{box-shadow:none;page-break-after:always;margin:0;}
  @page{size:A4;margin:0;}
}
@media (max-width:900px){
  .shell{grid-template-columns:1fr;}
  .controls{display:none;}
  .pdf-page,.cert-page,.page-break{width:100%!important;min-width:0;}
}
</style>
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-left">
    <div class="back-btn" onclick="window.location.href='index.html'"><i class="ti ti-arrow-left"></i> Wizard</div>
    <div class="back-btn" onclick="window.location.href='preview.html'"><i class="ti ti-eye"></i> Preview</div>
    <span class="topbar-title">Generate Report</span>
  </div>
  <div class="type-tabs">
    <div class="tab active" data-type="full" onclick="switchType('full')">Full Report</div>
    <div class="tab" data-type="handover" onclick="switchType('handover')">Handover Certificate</div>
    <div class="tab" data-type="isp" onclick="switchType('isp')">ISP Record</div>
    <div class="tab" data-type="maintenance" onclick="switchType('maintenance')">Maintenance Card</div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-primary" onclick="window.print()"><i class="ti ti-printer"></i> Print / Save PDF</button>
  </div>
</div>

<div class="shell">

  <!-- ── Controls panel ───────────────────────────────────── -->
  <div class="controls">
    <div>
      <div class="ctrl-section">Brand</div>
      <div class="ctrl-group">
        <div class="ctrl-row"><div><div class="ctrl-label">ISP / Company name</div></div></div>
        <input type="text" class="ctrl-input" id="isp-name" value="My ISP Ltd" oninput="rebuildReport()">
        <div class="ctrl-row"><div><div class="ctrl-label">Accent colour</div></div></div>
        <div class="color-row">
          <div class="color-swatch active" style="background:#1d9e75;" data-color="#1d9e75" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#185fa5;" data-color="#185fa5" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#7c3aed;" data-color="#7c3aed" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#b45309;" data-color="#b45309" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#be123c;" data-color="#be123c" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#0e7490;" data-color="#0e7490" onclick="setAccent(this)"></div>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="ctrl-section">Include sections</div>
      <div class="checklist" id="section-checks"></div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="ctrl-section">Completeness</div>
      <div class="completeness-block">
        <div class="pct" id="ctrl-pct">—%</div>
        <p>of required fields filled</p>
      </div>
      <div class="missing-list" id="ctrl-missing" style="display:none;"></div>
    </div>
    <div class="print-btn-wrap">
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="window.print()"><i class="ti ti-file-type-pdf"></i> Save as PDF</button>
      <p style="font-size:10px;color:var(--hint);margin-top:8px;text-align:center;">Use "Save as PDF" in the print dialog</p>
    </div>
  </div>

  <!-- ── Preview pane ──────────────────────────────────────── -->
  <div class="preview-pane" id="preview-pane">
    <div class="preview-label">PDF preview — use Print / Save PDF to export</div>
    <div id="report-output"></div>
  </div>

</div>

<script src="wizard-core.js"></script>
<script>
WizardState.load();

/* ── Config ──────────────────────────────────────────────── */
let accentColor = '#1d9e75';
let accentLight = '#e1f5ee';
let currentType = 'full';

const SECTION_TOGGLES = {
  full:        ['customer','service','odn','optical','ont','physical','testing','assets','acceptance'],
  handover:    ['customer','service','testing','acceptance'],
  isp:         ['customer','service','odn','optical','ont','physical','assets'],
  maintenance: ['customer','odn','optical','testing'],
};

let activeSections = [...SECTION_TOGGLES['full']];

const SECTION_LABELS = {
  customer:'Customer info', service:'Service info', odn:'ODN info',
  optical:'Optical readings', ont:'ONT / Router', physical:'Physical install',
  testing:'Testing & speeds', assets:'Asset tracking', acceptance:'Customer acceptance'
};

/* ── URL param ───────────────────────────────────────────── */
const urlType = new URLSearchParams(window.location.search).get('type');
if (urlType && SECTION_TOGGLES[urlType]) switchType(urlType, false);

/* ── Helpers ─────────────────────────────────────────────── */
function v(key) {
  const r = WizardState.get(key);
  return r && String(r).trim() ? String(r).trim() : '';
}
function dv(key) { return v(key) || '—'; }
function pf(label, key, mono) {
  const val = dv(key);
  return `<div class="pf"><div class="pl">${label}</div><div class="pv${val==='—'?' empty':''}${mono?' mono':''}">${val}</div></div>`;
}
function pfRaw(label, value, mono) {
  const empty = !value || value === '—';
  return `<div class="pf"><div class="pl">${label}</div><div class="pv${empty?' empty':''}${mono?' mono':''}">${empty?'—':value}</div></div>`;
}
function passTag(key) {
  const pv = v(key);
  if (!pv) return '<span style="color:#c0c8c4">—</span>';
  return pv === 'Fail'
    ? '<span class="fail">✗ FAIL</span>'
    : '<span class="pass">✓ PASS</span>';
}
function statusBadge(val) {
  if (!val) return '<span class="badge-warn">Unknown</span>';
  if (val.toLowerCase().includes('active')) return `<span class="badge-active">${val}</span>`;
  if (val.toLowerCase().includes('suspend')) return `<span class="badge-err">${val}</span>`;
  return `<span class="badge-warn">${val}</span>`;
}
function togBadge(key) {
  const on = v(key) === 'true' || v(key) === true;
  return `<span style="font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;background:${on?'#e1f5ee':'#f0f3f0'};color:${on?'#0f6e56':'#9eaaa4'};">${on?'✓ Yes':'✗ No'}</span>`;
}
function ispName() { return document.getElementById('isp-name')?.value || 'ISP Ltd'; }
function nowStr() { return new Date().toLocaleDateString('en-NG',{day:'2-digit',month:'short',year:'numeric'}); }
function css(extra='') {
  return `--accent:${accentColor};--accent-light:${accentLight};${extra}`;
}

/* ── Section builders ────────────────────────────────────── */
function buildCustomerSection() {
  return `
    <div class="pdf-section">
      <div class="pdf-section-title">Customer information</div>
      <div class="pdf-grid">
        ${pf('Full name','customer_name')}
        ${pf('Customer type','customer_type')}
        ${pf('Building type','building_type')}
        <div class="pf pdf-full"><div class="pl">Service address</div><div class="pv">${dv('address')}</div></div>
        ${pf('Nearest landmark','landmark')}
        ${pf('Phone','phone',true)}
        ${pf('Alternate contact','alt_phone',true)}
        ${pf('Ticket number','ticket_number',true)}
        ${pfRaw('Install date',v('install_date')?formatDate(v('install_date')):'')}
        ${pf('GPS coordinates','gps_coords',true)}
        ${pf('Technician','technician')}
      </div>
    </div>`;
}
function buildServiceSection() {
  const fee = v('monthly_fee') ? '₦' + Number(v('monthly_fee')).toLocaleString() : '—';
  return `
    <div class="pdf-section">
      <div class="pdf-section-title">Service information</div>
      <div class="pdf-grid-4">
        ${pfRaw('Status',statusBadge(v('service_status')))}
        ${pf('Plan / Package','service_plan')}
        ${pfRaw('CIR',v('cir')||'—')}
        ${pfRaw('Burst rate',v('burst_rate')||'—')}
        ${pf('VLAN ID','vlan_id',true)}
        ${pf('IP type','ip_type')}
        ${pf('IP address','ip_address',true)}
        ${pf('Subnet','subnet',true)}
        ${pfRaw('Contract',v('contract_duration')||'—')}
        ${pfRaw('Monthly fee',fee)}
        ${pf('BGP ASN','bgp_asn',true)}
        ${pf('VRF name','vrf_name',true)}
      </div>
    </div>`;
}
function buildODNSection() {
  return `
    <div class="pdf-section">
      <div class="pdf-section-title">ODN information</div>
      <div class="pdf-grid">
        ${pf('OLT name','olt_name',true)}

/* ── Orchestrate ──────────────────────────────────────────── */
function buildReport() {
  switch (currentType) {
    case 'full':        return buildFullReport();
    case 'handover':    return buildHandoverCert();
    case 'isp':         return buildISPRecord();
    case 'maintenance': return buildMaintenanceCard();
    default:            return buildFullReport();
  }
}

function rebuildReport() {
  document.getElementById('report-output').innerHTML = buildReport();
  updateCompleteness();
}

function switchType(type, rebuild=true) {
  currentType = type;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
  activeSections = [...SECTION_TOGGLES[type]];
  buildSectionChecks();
  if (rebuild) rebuildReport();
}

function setAccent(el) {
  accentColor = el.dataset.color;
  // Derive light version
  const lightMap = {
    '#1d9e75':'#e1f5ee','#185fa5':'#e1eaf7','#7c3aed':'#ede9ff',
    '#b45309':'#faeeda','#be123c':'#fde8ef','#0e7490':'#e0f4f8'
  };
  accentLight = lightMap[accentColor] || '#f0f0f0';
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('active', s.dataset.color === accentColor));
  rebuildReport();
}

function buildSectionChecks() {
  const container = document.getElementById('section-checks');
  container.innerHTML = Object.entries(SECTION_LABELS).map(([key, label]) => {
    const checked = activeSections.includes(key);
    return `<label class="check-item">
      <input type="checkbox" ${checked?'checked':''} data-sec="${key}" onchange="toggleSection('${key}',this.checked)">
      ${label}
    </label>`;
  }).join('');
}

function toggleSection(key, on) {
  if (on) { if (!activeSections.includes(key)) activeSections.push(key); }
  else { activeSections = activeSections.filter(s => s !== key); }
  rebuildReport();
}

function updateCompleteness() {
  const pct = WizardState.getOverallCompletion();
  document.getElementById('ctrl-pct').textContent = pct + '%';
  const missing = [];
  for (let i = 0; i < 10; i++) {
    const m = WizardState.getMissingFields(i);
    if (m.length) missing.push(...m.slice(0, 2));
  }
  const block = document.getElementById('ctrl-missing');
  if (missing.length > 0) {
    block.style.display = 'block';
    block.innerHTML = `<strong>Missing required fields:</strong><ul>${missing.slice(0,6).map(f=>`<li>${f}</li>`).join('')}${missing.length>6?`<li>…and ${missing.length-6} more</li>`:''}</ul>`;
  } else {
    block.style.display = 'none';
  }
}

/* ── Init ────────────────────────────────────────────────── */
buildSectionChecks();
rebuildReport();
if (urlType) switchType(urlType);
</script>
</body>
</html>
